kind = "web"
previewPath = "/"
title = "Medical Evaluation System"
version = "1.0.0"
id = "artifacts/logic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26003

[services.development]
run = "pnpm --filter @workspace/logic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/logic", "run", "build" ]
publicDir = "artifacts/logic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26003"
BASE_PATH = "/"
